name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt ruff

      - name: Lint with ruff
        run: ruff check backend/ tests/

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test-and-lint

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t millforge-backend ./backend
